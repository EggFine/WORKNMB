name: Build and Release

# 触发方式：
#   1. push 到 main → 自动递增 patch（v1.0.0 → v1.0.1 → v1.0.2 ...）
#      如果 commit message 带 [skip release] 则跳过本次发版
#   2. push tag v* → 使用该 tag 作为版本号（手动控制大版本跳跃）
#   3. Actions 页面手动 Run workflow → 可输入自定义版本号，或留空自动递增
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Explicit version tag (e.g. v2.0.0). Leave empty to auto-bump patch.'
        required: false
        default: ''

# 同一时刻只允许一个发版流水线在跑，避免快速连续 push 产生 tag 冲突
concurrency:
  group: release
  cancel-in-progress: false

# 创建 Release、push tag 需要 contents:write
permissions:
  contents: write

env:
  # pubspec.yaml 的 sdk 约束是 ^3.12.0-210.2.beta，用 beta 通道满足
  FLUTTER_CHANNEL: beta

jobs:
  # ═════════════════════════════════════════════════════════════════════════
  # 0. 预检 + 版本决策：
  #    - 若 commit 带 [skip release]，整个 workflow 跳过
  #    - 若触发方式是 tag push：直接用那个 tag
  #    - 若是 branch push / workflow_dispatch 且 version 为空：读最新 tag + 递增 patch
  #    - 若是 workflow_dispatch 且填了 version：用那个
  # ═════════════════════════════════════════════════════════════════════════
  prepare:
    name: Prepare version & run tests
    if: "!contains(github.event.head_commit.message, '[skip release]')"
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 需要拉取所有 tag 才能 git describe

      - name: Compute version
        id: compute
        shell: bash
        run: |
          INPUT_VERSION="${{ github.event.inputs.version }}"
          REF="${GITHUB_REF}"

          if [[ "$REF" == refs/tags/* ]]; then
            # 触发方式是 tag push
            VERSION="${REF#refs/tags/}"
            echo "Triggered by tag push: using $VERSION"
          elif [ -n "$INPUT_VERSION" ]; then
            # 手动 dispatch 填了版本号
            VERSION="$INPUT_VERSION"
            echo "Manual dispatch with explicit version: $VERSION"
          else
            # branch push 或未填的 dispatch → 自动递增 patch
            LATEST=$(git tag --list 'v*' --sort=-v:refname | head -n1)
            if [ -z "$LATEST" ]; then
              LATEST="v0.0.0"
              echo "No existing tags found, starting from $LATEST"
            else
              echo "Latest tag: $LATEST"
            fi
            STRIPPED="${LATEST#v}"
            IFS='.' read -ra PARTS <<< "$STRIPPED"
            MAJOR="${PARTS[0]:-0}"
            MINOR="${PARTS[1]:-0}"
            PATCH="${PARTS[2]:-0}"
            NEW_PATCH=$((PATCH + 1))
            VERSION="v${MAJOR}.${MINOR}.${NEW_PATCH}"
            echo "Auto-bumped patch: $VERSION"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Final VERSION=$VERSION"

      - name: Create and push tag (if auto-bumped)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        shell: bash
        run: |
          VERSION="${{ steps.compute.outputs.version }}"
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists, reusing."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$VERSION"
          git push origin "$VERSION"
          echo "Created and pushed tag $VERSION"

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  # ═════════════════════════════════════════════════════════════════════════
  # 1. Android
  # ═════════════════════════════════════════════════════════════════════════
  build-android:
    name: Android (APK + AAB)
    needs: prepare
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
      - run: flutter pub get
      - run: flutter build apk --release
      - run: flutter build appbundle --release
      - name: Rename artifacts
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             "worknmb-${VERSION}-android.apk"
          mv build/app/outputs/bundle/release/app-release.aab \
             "worknmb-${VERSION}-android.aab"
      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: |
            worknmb-*-android.apk
            worknmb-*-android.aab
          if-no-files-found: error

  # ═════════════════════════════════════════════════════════════════════════
  # 2. Windows
  # ═════════════════════════════════════════════════════════════════════════
  build-windows:
    name: Windows x64
    needs: prepare
    runs-on: windows-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Package to zip
        shell: pwsh
        run: |
          $zipName = "worknmb-$env:VERSION-windows-x64.zip"
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath $zipName
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: worknmb-*-windows-x64.zip
          if-no-files-found: error

  # ═════════════════════════════════════════════════════════════════════════
  # 3. macOS
  # ═════════════════════════════════════════════════════════════════════════
  build-macos:
    name: macOS (DMG)
    needs: prepare
    runs-on: macos-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
      - run: flutter pub get
      - run: flutter build macos --release
      - name: Package to DMG
        run: |
          cd build/macos/Build/Products/Release
          APP_BUNDLE=$(ls -d *.app | head -1)
          hdiutil create \
            -volname "WORKNMB" \
            -srcfolder "$APP_BUNDLE" \
            -ov -format UDZO \
            "$GITHUB_WORKSPACE/worknmb-${VERSION}-macos.dmg"
      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: worknmb-*-macos.dmg
          if-no-files-found: error

  # ═════════════════════════════════════════════════════════════════════════
  # 4. Linux
  # ═════════════════════════════════════════════════════════════════════════
  build-linux:
    name: Linux x64
    needs: prepare
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
      - run: flutter pub get
      - run: flutter build linux --release
      - name: Package to tar.gz
        run: |
          cd build/linux/x64/release/bundle
          tar -czf "$GITHUB_WORKSPACE/worknmb-${VERSION}-linux-x64.tar.gz" .
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: worknmb-*-linux-x64.tar.gz
          if-no-files-found: error

  # ═════════════════════════════════════════════════════════════════════════
  # 5. Web
  # ═════════════════════════════════════════════════════════════════════════
  build-web:
    name: Web (static)
    needs: prepare
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
      - run: flutter pub get
      - run: flutter build web --release
      - name: Package to zip
        run: |
          cd build/web
          zip -r "$GITHUB_WORKSPACE/worknmb-${VERSION}-web.zip" .
      - uses: actions/upload-artifact@v4
        with:
          name: web
          path: worknmb-*-web.zip
          if-no-files-found: error

  # ═════════════════════════════════════════════════════════════════════════
  # 6. iOS（未签名）
  # ═════════════════════════════════════════════════════════════════════════
  build-ios:
    name: iOS (unsigned)
    needs: prepare
    runs-on: macos-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
      - run: flutter pub get
      - name: Build unsigned iOS
        run: flutter build ios --release --no-codesign
      - name: Wrap to IPA
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r "$GITHUB_WORKSPACE/worknmb-${VERSION}-ios-unsigned.ipa" Payload
      - uses: actions/upload-artifact@v4
        with:
          name: ios
          path: worknmb-*-ios-unsigned.ipa
          if-no-files-found: error

  # ═════════════════════════════════════════════════════════════════════════
  # 7. 汇总 & 发布到 GitHub Release
  # ═════════════════════════════════════════════════════════════════════════
  release:
    name: Create GitHub Release
    needs:
      - prepare
      - build-android
      - build-windows
      - build-macos
      - build-linux
      - build-web
      - build-ios
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten into release/
        run: |
          mkdir -p release
          find artifacts -type f \
            \( -name '*.apk' -o -name '*.aab' \
               -o -name '*.zip' -o -name '*.tar.gz' \
               -o -name '*.dmg' -o -name '*.ipa' \) \
            -exec cp {} release/ \;
          ls -la release/

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: WORKNMB ${{ env.VERSION }}
          generate_release_notes: true
          files: release/*
          body: |
            ## WORKNMB ${{ env.VERSION }}

            ### 下载对应平台

            | 平台 | 文件 | 说明 |
            |------|------|------|
            | Android | `worknmb-*-android.apk` | 直接点击安装（需允许"未知来源"）|
            | Android | `worknmb-*-android.aab` | Google Play Store 上架用 |
            | Windows | `worknmb-*-windows-x64.zip` | 解压后运行 `worknmb.exe`，便携版 |
            | macOS   | `worknmb-*-macos.dmg`        | 双击挂载后拖入 Applications 文件夹 |
            | Linux   | `worknmb-*-linux-x64.tar.gz` | 解压后运行 `worknmb` |
            | Web     | `worknmb-*-web.zip`          | 解压部署到任意静态 HTTP 服务器 |
            | iOS     | `worknmb-*-ios-unsigned.ipa` | **未签名** — 仅供 AltStore/Xcode 侧载 |

            ### 注意事项

            - **Android APK** 默认使用 debug keystore 签名，正式上架商店需配置 signing config。
            - **macOS DMG** 未经 Apple 公证，首次打开会提示"无法验证开发者"，右键 → 打开 即可。
            - **iOS IPA** 未签名，无法直接安装到普通 iPhone，需 AltStore 等工具侧载或自行签名。
            - 如需跳过某次 push 的发版，在 commit message 里加 `[skip release]` 标记。
